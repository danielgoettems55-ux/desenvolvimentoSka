<!doctype html>
<html lang="pt-BR">
  <head>
    <!-- Metadados: não aparecem na tela -->
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />

    <title>Jogo de Turno</title>
  </head>

  <body style="background-color: rgb(53, 53, 53)">
    <div class="bordaPrincipal" id="selecao">
      <div class="texto margem">
        <label> Escolha os personagens </label>
      </div>
      <div class="texto margem">
        Player 1

        <input type="radio" name="play1" value="1" /> Mago
        <input type="radio" name="play1" value="2" /> Guerreiro
      </div>
      <div class="texto margem">
        Player 2
        <input type="radio" name="play2" value="1" /> Mago
        <input type="radio" name="play2" value="2" /> Guerreiro
      </div>
      <div>
        <button id="jogar" class="botao-rpg">Jogar</button>
      </div>
    </div>

    <div class="bordaPrincipal" id="game">
      <div class="batalha">
        <h1>Batalha</h1>
      </div>
      <div>
        <div class="linha espacamento" style="display: inline-flex">
          <div class="borda" id="borda-playerum">
            <img id="imgJogadorUm" class="tamanhoImagem personagem" src="" />
            <div id="NomeUm"></div>
            <p id="JogadorUmVida">HP:</p>
            <div class="bordaVida">
              <div id="jogadorUmVidaPorcentagem" class="barraVida"></div>
            </div>
          </div>

          <div>
            <img class="vs" src="./public/vs.png" />
          </div>

          <div class="borda" id="borda-playerdois">
            <img id="imgJogadorDois" class="tamanhoImagem" src="" />
            <div class="vida">
              <div id="NomeDois"></div>
              <p id="JogadorDoisVida">HP:</p>
              <div class="bordaVida">
                <div id="jogadorDoisVidaPorcentagem" class="barraVida"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="console" class="bordaConsole">Console</div>
    </div>

    <script src="JogoIndex.js"></script>
  </body>
</html>
